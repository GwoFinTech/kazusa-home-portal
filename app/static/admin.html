<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/common.css">
  <title>admin — home</title>
  <style>
    body { padding: 24px; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .back { font-size: 13px; color: var(--text-muted); text-decoration: none; display: inline-block; margin-bottom: 8px; }
    .back:hover { color: var(--text); }
    .tabs { display: flex; gap: 0; margin: 16px 0 0; border-bottom: 1px solid var(--border); border-radius: 0; overflow-x: auto; }
    .tab { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; border-radius: 0; transition: color .15s, border-color .15s; white-space: nowrap; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .section { display: none; }
    .section.active { display: block; }
    h2 { font-size: 15px; font-weight: 600; margin: 20px 0 12px; }
    h2 .hint { font-size: 11px; font-weight: 400; color: var(--text-subtle); margin-left: 8px; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
    th { text-align: left; padding: 8px 12px; color: var(--text-muted); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--hover-bg); }
    .role-input { width: 80px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px; background: var(--card-bg); color: var(--text); font-size: 12px; font-family: inherit; }
    .role-input:focus { outline: none; border-color: #94a3b8; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
    .form-row button { flex-shrink: 0; }
    .form-row input, .form-row select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); color: var(--text); font-size: 13px; flex: 1; min-width: 120px; }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: #94a3b8; }
    .toggle { cursor: pointer; }
    #denied { text-align: center; padding: 80px 24px; color: var(--text-muted); }
    .audit-time { color: var(--text-subtle); font-size: 11px; white-space: nowrap; }
    .audit-action { font-weight: 500; }
    @media (max-width: 480px) {
      body { padding: 16px; }
      .tab { padding: 10px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <a href="/" class="back"><i data-lucide="arrow-left" aria-hidden="true"></i> back</a>
  <h1>admin</h1>
  <div id="denied" style="display:none"><p>access denied</p></div>
  <div id="panel" style="display:none">
    <div id="msg" class="msg"></div>

    <div class="tabs">
      <button class="tab active" data-tab="role-acl">Role Access</button>
      <button class="tab" data-tab="presets">Role Presets</button>
      <button class="tab" data-tab="users">Users</button>
      <button class="tab" data-tab="user-acl">User Access</button>
      <button class="tab" data-tab="announcements">公告</button>
      <button class="tab" data-tab="audit">审计日志</button>
    </div>

    <!-- Role ACL -->
    <div class="section active" id="sec-role-acl">
      <h2>Role Access <span class="hint">按角色批量授权，优先于用户级规则</span></h2>
      <div class="form-row">
        <input id="racl-domain" placeholder="domain (e.g. *.kazusa.feng.moe)">
        <input id="racl-role" placeholder="role (e.g. user)">
        <button class="btn btn-sm btn-primary" onclick="addRoleAcl()">Add</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Domain</th><th>Role</th><th>Enabled</th><th></th></tr></thead>
        <tbody id="racl-body"></tbody>
      </table></div>
    </div>

    <!-- Role Presets -->
    <div class="section" id="sec-presets">
      <h2>Role Presets <span class="hint">为未登录邮箱预设角色，首次登录自动生效</span></h2>
      <div class="form-row">
        <input id="preset-email" placeholder="email (e.g. friend@gmail.com)">
        <input id="preset-role" placeholder="role (e.g. friend)">
        <button class="btn btn-sm btn-primary" onclick="addPreset()">Add</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody id="presets-body"></tbody>
      </table></div>
    </div>

    <!-- Users -->
    <div class="section" id="sec-users">
      <h2>Users</h2>
      <div class="table-wrap"><table>
        <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Last Login</th><th></th></tr></thead>
        <tbody id="users-body"></tbody>
      </table></div>
    </div>

    <!-- ACL (per-user) -->
    <div class="section" id="sec-user-acl">
      <h2>User Access <span class="hint">单个用户授权，仅当 Role ACL 不匹配时生效</span></h2>
      <div class="form-row">
        <input id="acl-domain" placeholder="domain (e.g. *.kazusa.feng.moe)">
        <input id="acl-email" placeholder="email (e.g. *@feng.moe)">
        <button class="btn btn-sm btn-primary" onclick="addAcl()">Add</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Domain</th><th>Email</th><th>Enabled</th><th></th></tr></thead>
        <tbody id="acl-body"></tbody>
      </table></div>
    </div>

    <!-- Announcements -->
    <div class="section" id="sec-announcements">
      <h2>公告管理 <span class="hint">发布的公告会在主页顶部显示</span></h2>
      <div class="form-row">
        <input id="ann-message" placeholder="公告内容">
        <select id="ann-level"><option value="info">信息</option><option value="warn">警告</option><option value="error">紧急</option></select>
        <button class="btn btn-sm btn-primary" onclick="addAnnouncement()">发布</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>内容</th><th>级别</th><th>状态</th><th>时间</th><th></th></tr></thead>
        <tbody id="ann-body"></tbody>
      </table></div>
    </div>

    <!-- Audit Log -->
    <div class="section" id="sec-audit">
      <h2>审计日志 <span class="hint">记录所有管理操作</span></h2>
      <div class="table-wrap"><table>
        <thead><tr><th>时间</th><th>操作者</th><th>操作</th><th>目标</th><th>详情</th></tr></thead>
        <tbody id="audit-body"></tbody>
      </table></div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="/common.js?v=lucide-v1"></script>
<script>
const msg = document.getElementById('msg');
window.csrfToken = '';
function showMsg(text, ok=true) {
  msg.textContent = text; msg.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err'); msg.style.display='block';
  setTimeout(() => msg.style.display='none', 3000);
}

// ── Tab switching ──
const tabs = document.querySelectorAll('.tab');
const sections = document.querySelectorAll('.section');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'));
    sections.forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    const loaders = { 'role-acl': loadRoleAcl, 'presets': loadPresets, 'users': loadUsers, 'user-acl': loadAcl, 'announcements': loadAnnouncements, 'audit': loadAudit };
    const fn = loaders[tab.dataset.tab];
    if (fn) fn();
  });
});

function switchToHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return;
  const target = document.querySelector(`.tab[data-tab="${hash}"]`);
  if (target) target.click();
}
window.addEventListener('hashchange', switchToHash);

async function init() {
  const r = await apiFetch('/api/me');
  if (!r.ok) { document.getElementById('denied').style.display='block'; return; }
  const u = await r.json();
  if (!u.authenticated || u.role !== 'admin') { document.getElementById('denied').style.display='block'; return; }
  window.csrfToken = u.csrf || '';
  document.getElementById('panel').style.display='block';
  loadRoleAcl();
  switchToHash();
}

// ── Role ACL ──
async function loadRoleAcl() {
  const r = await apiFetch('/api/admin/role-acl');
  if (!r.ok) return;
  const rules = await r.json();
  document.getElementById('racl-body').innerHTML = rules.map(r => `
    <tr>
      <td><code>${esc(r.domain)}</code></td>
      <td><span class="badge badge-${r.role === 'admin' ? 'admin' : r.role === 'user' ? 'user' : 'custom'}">${esc(r.role)}</span></td>
      <td class="toggle" onclick="toggleRoleAcl(${r.id},${!r.enabled})">${r.enabled ? icon('circle-check-big', 'toggle-icon', '已启用') : icon('circle', 'toggle-icon', '未启用')}</td>
      <td><button class="btn btn-sm btn-danger" onclick="delRoleAcl(${r.id})">delete</button></td>
    </tr>
  `).join('');
  refreshIcons();
}
async function addRoleAcl() {
  const domain = document.getElementById('racl-domain').value.trim();
  const role = document.getElementById('racl-role').value.trim();
  if (!domain || !role) { showMsg('domain and role required', false); return; }
  const r = await apiFetch('/api/admin/role-acl', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({domain,role})});
  if (r.ok) { showMsg('role rule added'); document.getElementById('racl-domain').value=''; document.getElementById('racl-role').value=''; loadRoleAcl(); }
  else { const e = await r.json(); showMsg(e.error || 'failed', false); }
}
async function toggleRoleAcl(id, enabled) {
  await apiFetch(`/api/admin/role-acl/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabled})});
  loadRoleAcl();
}
async function delRoleAcl(id) {
  await apiFetch(`/api/admin/role-acl/${id}`, {method:'DELETE'});
  showMsg('role rule deleted'); loadRoleAcl();
}

// ── Role Presets ──
async function loadPresets() {
  const r = await apiFetch('/api/admin/role-presets');
  if (!r.ok) return;
  const presets = await r.json();
  document.getElementById('presets-body').innerHTML = presets.map(p => {
    const badgeCls = p.role === 'admin' ? 'badge-admin' : p.role === 'user' ? 'badge-user' : 'badge-custom';
    return `<tr>
      <td>${esc(p.email)}</td>
      <td>
        <span class="badge ${badgeCls}" id="preset-badge-${p.id}">${esc(p.role)}</span>
        <input class="role-input" id="preset-input-${p.id}" value="${esc(p.role)}" style="display:none" onkeydown="if(event.key==='Enter')savePreset(${p.id})">
        <button class="btn btn-sm btn-outline" id="preset-edit-btn-${p.id}" onclick="editPreset(${p.id})">edit</button>
        <button class="btn btn-sm btn-primary" id="preset-save-btn-${p.id}" style="display:none" onclick="savePreset(${p.id})">save</button>
      </td>
      <td><button class="btn btn-sm btn-danger" onclick="delPreset(${p.id},'${esc(p.email)}')">delete</button></td>
    </tr>`;
  }).join('');
}
function editPreset(id) {
  document.getElementById('preset-badge-'+id).style.display='none';
  document.getElementById('preset-input-'+id).style.display='';
  document.getElementById('preset-edit-btn-'+id).style.display='none';
  document.getElementById('preset-save-btn-'+id).style.display='';
  document.getElementById('preset-input-'+id).focus();
  document.getElementById('preset-input-'+id).select();
}
async function savePreset(id) {
  const role = document.getElementById('preset-input-'+id).value.trim();
  if (!role) { showMsg('role must not be empty', false); return; }
  await apiFetch(`/api/admin/role-presets/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role})});
  showMsg('preset updated'); loadPresets();
}
async function addPreset() {
  const email = document.getElementById('preset-email').value.trim();
  const role = document.getElementById('preset-role').value.trim();
  if (!email || !role) { showMsg('email and role required', false); return; }
  const r = await apiFetch('/api/admin/role-presets', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,role})});
  if (r.ok) { showMsg('preset added'); document.getElementById('preset-email').value=''; document.getElementById('preset-role').value=''; loadPresets(); }
  else { const e = await r.json(); showMsg(e.error || 'failed', false); }
}
async function delPreset(id, email) {
  if (!confirm(`Delete preset for ${email}?`)) return;
  await apiFetch(`/api/admin/role-presets/${id}`, {method:'DELETE'});
  showMsg('preset deleted'); loadPresets();
}

// ── Users ──
async function loadUsers() {
  const r = await apiFetch('/api/admin/users');
  if (!r.ok) return;
  const users = await r.json();
  document.getElementById('users-body').innerHTML = users.map(u => {
    const badgeCls = u.role === 'admin' ? 'badge-admin' : u.role === 'user' ? 'badge-user' : 'badge-custom';
    return `<tr>
      <td>${esc(u.email)}</td>
      <td>${esc(u.name)}</td>
      <td>
        <span class="badge ${badgeCls}" id="role-badge-${u.id}">${esc(u.role)}</span>
        <input class="role-input" id="role-input-${u.id}" value="${esc(u.role)}" style="display:none" onkeydown="if(event.key==='Enter')saveRole(${u.id})">
        <button class="btn btn-sm btn-outline" id="role-edit-btn-${u.id}" onclick="editRole(${u.id})">edit</button>
        <button class="btn btn-sm btn-primary" id="role-save-btn-${u.id}" style="display:none" onclick="saveRole(${u.id})">save</button>
      </td>
      <td>${u.last_login_at ? new Date(u.last_login_at).toLocaleDateString() : '—'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="delUser(${u.id},'${esc(u.email)}')">delete</button></td>
    </tr>`;
  }).join('');
}
function editRole(id) {
  document.getElementById('role-badge-'+id).style.display='none';
  document.getElementById('role-input-'+id).style.display='';
  document.getElementById('role-edit-btn-'+id).style.display='none';
  document.getElementById('role-save-btn-'+id).style.display='';
  document.getElementById('role-input-'+id).focus();
  document.getElementById('role-input-'+id).select();
}
async function saveRole(id) {
  const role = document.getElementById('role-input-'+id).value.trim();
  if (!role) { showMsg('role must not be empty', false); return; }
  await apiFetch(`/api/admin/users/${id}/role`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role})});
  showMsg('role updated'); loadUsers();
}
async function delUser(id, email) {
  if (!confirm(`Delete user ${email}?`)) return;
  await apiFetch(`/api/admin/users/${id}`, {method:'DELETE'});
  showMsg('user deleted'); loadUsers();
}

// ── Per-user ACL ──
async function loadAcl() {
  const r = await apiFetch('/api/admin/acl');
  if (!r.ok) return;
  const rules = await r.json();
  document.getElementById('acl-body').innerHTML = rules.map(r => `<tr>
    <td>${esc(r.domain)}</td>
    <td>${esc(r.email)}</td>
    <td class="toggle" onclick="toggleAcl(${r.id},${!r.enabled})">${r.enabled ? icon('circle-check-big', 'toggle-icon', '已启用') : icon('circle', 'toggle-icon', '未启用')}</td>
    <td><button class="btn btn-sm btn-danger" onclick="delAcl(${r.id})">delete</button></td>
  </tr>`).join('');
  refreshIcons();
}
async function addAcl() {
  const domain = document.getElementById('acl-domain').value.trim();
  const email = document.getElementById('acl-email').value.trim();
  if (!domain || !email) { showMsg('domain and email required', false); return; }
  const r = await apiFetch('/api/admin/acl', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({domain,email})});
  if (r.ok) { showMsg('rule added'); document.getElementById('acl-domain').value=''; document.getElementById('acl-email').value=''; loadAcl(); }
  else showMsg('failed', false);
}
async function toggleAcl(id, enabled) {
  await apiFetch(`/api/admin/acl/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabled})});
  loadAcl();
}
async function delAcl(id) {
  await apiFetch(`/api/admin/acl/${id}`, {method:'DELETE'});
  showMsg('rule deleted'); loadAcl();
}

// ── Announcements ──
async function loadAnnouncements() {
  const r = await apiFetch('/api/admin/announcements');
  if (!r.ok) return;
  const items = await r.json();
  const levelLabel = {info:'信息', warn:'警告', error:'紧急'};
  document.getElementById('ann-body').innerHTML = items.map(a => `<tr>
    <td>${esc(a.message)}</td>
    <td><span class="badge badge-${a.level === 'error' ? 'admin' : a.level === 'warn' ? 'custom' : 'user'}">${levelLabel[a.level] || a.level}</span></td>
    <td class="toggle" onclick="toggleAnnouncement(${a.id},${!a.active})">${a.active ? icon('circle-check-big', 'toggle-icon', '已启用') : icon('circle', 'toggle-icon', '未启用')}</td>
    <td class="audit-time">${new Date(a.created_at).toLocaleString()}</td>
    <td><button class="btn btn-sm btn-danger" onclick="delAnnouncement(${a.id})">delete</button></td>
  </tr>`).join('');
  refreshIcons();
}
async function addAnnouncement() {
  const message = document.getElementById('ann-message').value.trim();
  const level = document.getElementById('ann-level').value;
  if (!message) { showMsg('message required', false); return; }
  const r = await apiFetch('/api/admin/announcements', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message, level})});
  if (r.ok) { showMsg('公告已发布'); document.getElementById('ann-message').value=''; loadAnnouncements(); }
  else showMsg('failed', false);
}
async function toggleAnnouncement(id, active) {
  await apiFetch(`/api/admin/announcements/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({active})});
  loadAnnouncements();
}
async function delAnnouncement(id) {
  await apiFetch(`/api/admin/announcements/${id}`, {method:'DELETE'});
  showMsg('公告已删除'); loadAnnouncements();
}

// ── Audit Log ──
async function loadAudit() {
  const r = await apiFetch('/api/admin/audit');
  if (!r.ok) return;
  const logs = await r.json();
  document.getElementById('audit-body').innerHTML = logs.map(l => `<tr>
    <td class="audit-time">${new Date(l.created_at).toLocaleString()}</td>
    <td>${esc(l.actor_email)}</td>
    <td class="audit-action">${esc(l.action)}</td>
    <td>${esc(l.target)}</td>
    <td style="color:var(--text-muted);font-size:12px">${esc(l.details)}</td>
  </tr>`).join('');
  refreshIcons();
}

init();
</script>
</body>
</html>
