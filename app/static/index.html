<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>
  <style>
    :root {
      --bg: #fafafa;
      --card-bg: #fff;
      --border: #e5e7eb;
      --text: #171717;
      --text-muted: #737373;
      --text-subtle: #a3a3a3;
      --hover-bg: #f5f5f5;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --card-bg: #171717;
        --border: #262626;
        --text: #fafafa;
        --text-muted: #a3a3a3;
        --text-subtle: #525252;
        --hover-bg: #1a1a1a;
        --shadow: 0 1px 3px rgba(0,0,0,.3);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      padding: 48px 24px 8px;
      text-align: center;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 24px;
      width: 100%;
      max-width: 960px;
    }
    .card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: background .15s, border-color .15s;
    }
    .card:hover {
      background: var(--hover-bg);
      border-color: #d4d4d4;
    }
    @media (prefers-color-scheme: dark) {
      .card:hover { border-color: #404040; }
    }
    .card .icon {
      font-size: 28px;
      line-height: 1;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .card .meta {
      flex: 1;
      min-width: 0;
    }
    .card .meta h3 {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card .meta p {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .status-running { background: #22c55e; }
    .status-other   { background: #a3a3a3; }

    .empty {
      text-align: center;
      color: var(--text-subtle);
      font-size: 14px;
      padding: 64px 24px;
    }
    .error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #ef4444;
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .error-toast.show { opacity: 1; }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 11px;
      color: var(--text-subtle);
    }
  </style>
</head>
<body>

<header>
  <h1>home</h1>
  <p id="subtitle">loading…</p>
</header>
<div class="grid" id="grid"></div>
<div class="error-toast" id="toast"></div>
<footer>home-portal</footer>

<script>
const grid = document.getElementById('grid');
const subtitle = document.getElementById('subtitle');
const toast = document.getElementById('toast');

function showError(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function load() {
  try {
    const res = await fetch('/api/services');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const services = await res.json();

    subtitle.textContent = `${services.length} service${services.length !== 1 ? 's' : ''}`;

    if (!services.length) {
      grid.innerHTML = '<div class="empty">no services found</div>';
      return;
    }

    grid.innerHTML = services.map(s => `
      <a class="card" href="${esc(s.url)}" target="_blank" rel="noopener"
         ${!s.url ? 'style="pointer-events:none;opacity:.5"' : ''}>
        <div class="icon">${esc(s.icon)}</div>
        <div class="meta">
          <h3>${esc(s.title)}</h3>
          ${s.description ? `<p>${esc(s.description)}</p>` : ''}
        </div>
        <div class="status-dot status-${s.status === 'running' ? 'running' : 'other'}"
             title="${esc(s.status)}"></div>
      </a>
    `).join('');
  } catch (e) {
    subtitle.textContent = 'error';
    showError('failed to load services');
    console.error(e);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

load();
setInterval(load, 30000); // refresh every 30s
</script>
</body>
</html>
