<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/common.css">
  <title>Kazusa Home</title>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header {
      padding: 48px 24px 8px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
    header p { color: var(--text-muted); font-size: 13px; }
    .user-bar { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
    .user-bar img { width: 24px; height: 24px; border-radius: 50%; }
    .user-bar span { font-size: 13px; color: var(--text-muted); }
    .user-bar a { font-size: 12px; color: var(--text-subtle); text-decoration: none; }
    .user-bar a:hover { color: var(--text); }
    .google-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      text-decoration: none; transition: background .15s, box-shadow .15s;
      border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
      box-shadow: var(--shadow);
    }
    .google-btn:hover { background: var(--hover-bg); }
    .google-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Announcement banner */
    .announcement {
      width: 100%; max-width: 960px; margin: 0 24px; padding: 10px 16px;
      border-radius: 8px; font-size: 13px; line-height: 1.5;
      display: none; align-items: center; gap: 8px;
    }
    .announcement.info { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
    .announcement.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .announcement.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    :root[data-theme="dark"] .announcement.info,
    :root:not([data-theme="light"]) .announcement.info { background: #172554; color: #93c5fd; border-color: #1e3a5f; }
    :root[data-theme="dark"] .announcement.warn,
    :root:not([data-theme="light"]) .announcement.warn { background: #451a03; color: #fbbf24; border-color: #78350f; }
    :root[data-theme="dark"] .announcement.error,
    :root:not([data-theme="light"]) .announcement.error { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }
    .announcement .dismiss { margin-left: auto; cursor: pointer; opacity: .6; font-size: 16px; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px; padding: 24px; width: 100%; max-width: 960px;
    }
    .card {
      display: flex; align-items: flex-start; gap: 14px; padding: 16px;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      text-decoration: none; color: inherit;
      transition: background .15s, border-color .15s; position: relative;
    }
    .card:hover { background: var(--hover-bg); border-color: #d4d4d4; }
    :root[data-theme="dark"] .card:hover,
    :root:not([data-theme="light"]) .card:hover { border-color: #404040; }
    .card .icon { font-size: 28px; line-height: 1; flex-shrink: 0; width: 36px; text-align: center; }
    .card .meta { flex: 1; min-width: 0; }
    .card .meta h3 { font-size: 14px; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .meta p { font-size: 12px; color: var(--text-muted); line-height: 1.4; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .status-running { background: var(--success); }
    .status-exited { background: var(--danger); }
    .status-restarting { background: var(--warning); animation: pulse 1.5s ease-in-out infinite; }
    .status-unhealthy { background: var(--warning); }
    .status-created { background: var(--primary); }
    .status-paused { background: var(--text-subtle); }
    .status-other { background: var(--text-subtle); }
    @keyframes pulse { 50% { opacity: .4; } }
    .empty { text-align: center; color: var(--text-subtle); font-size: 14px; padding: 64px 24px; }
    footer { margin-top: auto; padding: 24px; font-size: 11px; color: var(--text-subtle); }

    .card.disabled { opacity: .55; cursor: not-allowed; pointer-events: none; }
    .card .badge { position: absolute; top: 8px; right: 8px; font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; font-weight: 500; }
    .badge-login { background: var(--primary); color: #fff; }
    .badge-role { background: var(--warning); color: #fff; }

    /* Skeleton loading */
    .skeleton { background: var(--border); border-radius: 4px; animation: shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer { 0%,100% { opacity: .4; } 50% { opacity: .8; } }
    .skeleton-card { height: 72px; border-radius: var(--radius); }
  </style>
</head>
<body>
<header>
  <h1>Kazusa Home</h1>
  <p id="subtitle">loading…</p>
  <div id="user-bar" class="user-bar" style="display:none"></div>
</header>
<div id="announcements"></div>
<div class="grid" id="grid">
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
</div>
<footer>kazusa home portal</footer>
<script src="/common.js"></script>
<script>
const grid = document.getElementById('grid');
const subtitle = document.getElementById('subtitle');
const userBar = document.getElementById('user-bar');
const annDiv = document.getElementById('announcements');

async function loadUser() {
  try {
    const r = await fetch('/api/me');
    if (r.ok) {
      const u = await r.json();
      if (u.authenticated) {
        window.csrfToken = u.csrf || '';
        userBar.style.display = 'flex';
        userBar.innerHTML = `
          ${u.picture ? `<img src="${esc(u.picture)}" alt="">` : ''}
          <span>${esc(u.name || u.email)}</span>
          ${u.role === 'admin' ? '<a href="/admin">admin</a>' : ''}
          <a href="/auth/logout">logout</a>
        `;
        return;
      }
    }
  } catch {}
  userBar.style.display = 'flex';
  userBar.innerHTML = `<a class="google-btn" href="/auth/login">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    使用 Google 登录
  </a>`;
}

function statusClass(s) {
  if (s === 'running') return 'running';
  if (s === 'exited' || s === 'dead') return 'exited';
  if (s === 'restarting') return 'restarting';
  if (s === 'unhealthy') return 'unhealthy';
  if (s === 'created') return 'created';
  if (s === 'paused') return 'paused';
  return 'other';
}

async function loadAnnouncements() {
  try {
    const r = await fetch('/api/announcements');
    if (!r.ok) return;
    const items = await r.json();
    if (!items.length) { annDiv.style.display = 'none'; return; }
    annDiv.style.display = 'flex';
    annDiv.style.flexDirection = 'column';
    annDiv.style.gap = '8px';
    annDiv.style.marginBottom = '8px';
    annDiv.innerHTML = items.map(a => `
      <div class="announcement ${a.level}" style="display:flex">
        <span>${esc(a.message)}</span>
        <span class="dismiss" onclick="dismissAnnouncement(${a.id}, this)">✕</span>
      </div>
    `).join('');
  } catch {}
}

function dismissAnnouncement(id, el) {
  el.closest('.announcement').style.display = 'none';
}

async function loadServices() {
  try {
    const res = await fetch('/api/services');
    if (!res.ok) throw new Error();
    const services = await res.json();
    subtitle.textContent = `${services.length} 个服务`;
    if (!services.length) { grid.innerHTML = '<div class="empty">暂无服务</div>'; return; }
    grid.innerHTML = services.map(s => {
      const canAccess = s.access === 'allowed';
      const isUnauth = s.access === 'unauthenticated';
      const isDenied = s.access === 'denied';
      const disabled = !canAccess && s.url;
      const badge = isUnauth ? '<span class="badge badge-login">需要登录</span>'
                  : isDenied ? '<span class="badge badge-role">权限不足</span>'
                  : '';
      return `
        <a class="card ${disabled ? 'disabled' : ''}" href="${canAccess ? esc(s.url) : '#'}" target="_blank" rel="noopener"
           ${!s.url ? 'style="pointer-events:none;opacity:.5"' : ''}>
          ${badge}
          <div class="icon">${esc(s.icon)}</div>
          <div class="meta"><h3>${esc(s.title)}</h3>${s.description ? `<p>${esc(s.description)}</p>` : ''}</div>
          <div class="status-dot status-${statusClass(s.status)}" title="${esc(s.status)}"></div>
        </a>
      `;
    }).join('');
  } catch { subtitle.textContent = '加载失败'; }
}

loadUser();
loadAnnouncements();
loadServices();
setInterval(loadServices, 30000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
