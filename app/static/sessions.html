<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="/common.css">
  <title>登录设备管理 — kazusa</title>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px; }
    .container { max-width: 720px; width: 100%; }

    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .sub { font-size: 13px; color: var(--text-muted); }
    .header .back { font-size: 13px; color: var(--accent); text-decoration: none; margin-left: auto; }
    .header .back:hover { text-decoration: underline; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .toolbar .hint { font-size: 13px; color: var(--text-muted); }

    .session-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
    }
    .session-icon { flex-shrink: 0; }
    .session-icon .lucide { width: 28px; height: 28px; }
    .session-meta { flex: 1; min-width: 0; }
    .session-title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .session-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
    .session-sub code { font-family: ui-monospace, monospace; background: var(--bg); padding: 1px 4px; border-radius: 4px; }
    .badge {
      display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px;
      font-weight: 500;
    }
    .badge-current { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
    .badge-other { background: color-mix(in srgb, var(--text-muted) 12%, transparent); color: var(--text-muted); }

    .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); font-size: 14px; }
    .empty .icon { margin-bottom: 12px; }
    .empty .icon .lucide { width: 40px; height: 40px; }

    .msg {
      display: none; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px;
    }
    .msg-ok { background: color-mix(in srgb, var(--success) 10%, transparent); color: var(--success); display: block; }
    .msg-err { background: color-mix(in srgb, var(--danger) 10%, transparent); color: var(--danger); display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1><i data-lucide="monitor" aria-hidden="true"></i> 登录设备</h1>
        <div class="sub">查看并管理当前登录的设备和会话</div>
      </div>
      <a class="back" href="/"><i data-lucide="arrow-left" aria-hidden="true"></i> 返回首页</a>
    </div>

    <div class="toolbar">
      <button class="btn btn-outline btn-sm" id="logout-all-btn" onclick="revokeAll()"><i data-lucide="log-out" aria-hidden="true"></i> 退出其他设备</button>
      <span class="hint">当前设备不会被退出</span>
    </div>

    <div class="msg" id="msg"></div>

    <div id="session-list">
      <div class="empty"><div class="icon"><i data-lucide="monitor" aria-hidden="true"></i></div>加载中…</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="/common.js"></script>
  <script>
  const listEl = document.getElementById('session-list');
  const msgEl = document.getElementById('msg');

  function showMsg(text, ok) {
    msgEl.textContent = text;
    msgEl.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  }

  function hideMsg() {
    msgEl.className = 'msg';
    msgEl.textContent = '';
  }

  function deviceIcon(ua) {
    const u = (ua || '').toLowerCase();
    if (u.includes('iphone') || u.includes('ipad') || u.includes('android')) return icon('smartphone');
    return icon('laptop');
  }

  function deviceName(ua) {
    if (!ua) return '未知设备';
    // Try to extract browser + OS in a simple way
    let browser = '浏览器';
    const u = ua.toLowerCase();
    if (u.includes('chrome') && !u.includes('edg')) browser = 'Chrome';
    else if (u.includes('safari') && !u.includes('chrome')) browser = 'Safari';
    else if (u.includes('firefox')) browser = 'Firefox';
    else if (u.includes('edg')) browser = 'Edge';

    let os = '';
    if (u.includes('windows')) os = 'Windows';
    else if (u.includes('macintosh') || u.includes('mac os')) os = 'macOS';
    else if (u.includes('linux')) os = 'Linux';
    else if (u.includes('android')) os = 'Android';
    else if (u.includes('iphone') || u.includes('ipad')) os = 'iOS';

    return os ? `${browser} · ${os}` : browser;
  }

  function formatTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  async function loadSessions() {
    hideMsg();
    try {
      const r = await apiFetch('/api/me/sessions');
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        listEl.innerHTML = `<div class="empty"><div class="icon">${icon('triangle-alert')}</div>${esc(data.error || '加载失败')}</div>`;
        refreshIcons();
        return;
      }
      const sessions = await r.json();
      if (!sessions.length) {
        listEl.innerHTML = `<div class="empty"><div class="icon">${icon('monitor')}</div>没有活跃会话</div>`;
        refreshIcons();
        return;
      }
      listEl.innerHTML = sessions.map(s => `
        <div class="session-card">
          <div class="session-icon">${deviceIcon(s.user_agent)}</div>
          <div class="session-meta">
            <div class="session-title">
              ${deviceName(s.user_agent)}
              ${s.is_current ? '<span class="badge badge-current">当前设备</span>' : '<span class="badge badge-other">其他设备</span>'}
            </div>
            <div class="session-sub">
              IP: <code>${esc(s.ip_addr || '—')}</code> ·
              登录于 ${formatTime(s.created_at)} ·
              最后使用 ${formatTime(s.last_used_at)}<br>
              <span style="opacity:.7">${esc((s.user_agent || '').slice(0, 120))}</span>
            </div>
          </div>
          ${s.is_current ? '' : `<button class="btn btn-danger-outline btn-sm" onclick="revoke('${esc(s.id)}')">退出</button>`}
        </div>
      `).join('');
      refreshIcons();
    } catch (e) {
      listEl.innerHTML = `<div class="empty"><div class="icon">${icon('triangle-alert')}</div>加载失败：${esc(e.message)}</div>`;
      refreshIcons();
    }
  }

  async function revoke(sessionId) {
    hideMsg();
    if (!confirm('确定要退出该设备的登录吗？')) return;
    try {
      const r = await apiFetch('/api/me/sessions/' + encodeURIComponent(sessionId), { method: 'DELETE' });
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        showMsg(data.error || '退出失败', false);
        return;
      }
      showMsg('已退出该设备', true);
      await loadSessions();
    } catch (e) {
      showMsg('网络错误：' + e.message, false);
    }
  }

  async function revokeAll() {
    hideMsg();
    if (!confirm('确定要退出除当前设备外的所有设备吗？')) return;
    try {
      const r = await apiFetch('/api/me/sessions', { method: 'DELETE' });
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        showMsg(data.error || '退出失败', false);
        return;
      }
      const data = await r.json();
      showMsg(`已退出 ${data.revoked_count || 0} 个其他设备`, true);
      await loadSessions();
    } catch (e) {
      showMsg('网络错误：' + e.message, false);
    }
  }

  loadSessions();
  </script>
</body>
</html>
