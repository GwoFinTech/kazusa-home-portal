services:
  kazusa-home-portal:
    build: .
    container_name: kazusa-home-portal
    restart: unless-stopped
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://home.kazusa.feng.moe/auth/callback
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - ADMIN_EMAIL=fythonx@gmail.com
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_NAME=kazusa_home
      - DB_USER=postgres
      - PORTAL_URL=https://kazusa.feng.moe
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-net
    labels:
      # ── Traefik ──
      - "traefik.enable=true"
      - "traefik.http.routers.home.rule=Host(`kazusa.feng.moe`) || Host(`home.kazusa.feng.moe`) || Host(`home.milktea-jp1.feng.moe`)"
      - "traefik.http.routers.home.entrypoints=websecure"
      - "traefik.http.routers.home.tls.certresolver=letsencrypt"
      - "traefik.http.services.home.loadbalancer.server.port=8000"
      # ── ForwardAuth middleware (referenced by other services as kazusa-auth@docker) ──
      - "traefik.http.middlewares.kazusa-auth.forwardauth.address=http://kazusa-home-portal:8000/auth/verify"
      - "traefik.http.middlewares.kazusa-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Name,X-User-Role"
      - "traefik.http.middlewares.kazusa-auth.forwardauth.trustForwardHeader=true"

networks:
  traefik-net:
    external: true
    name: traefik_traefik-net
