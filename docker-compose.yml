services:
  kazusa-home-portal:
    build: .
    container_name: kazusa-home-portal
    restart: unless-stopped
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-kazusa_home}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - PORTAL_URL=${PORTAL_URL}
      - PORTAL_HOSTS=${PORTAL_HOSTS}
      - MOCK_AUTH_SECRET=${MOCK_AUTH_SECRET:-}
    ports:
      - "127.0.0.1:8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-net
    labels:
      # ── Traefik ──
      - "traefik.enable=true"
      - "traefik.http.routers.home.rule=Host(`${DOMAIN}`) || Host(`home.${DOMAIN}`)"
      - "traefik.http.routers.home.entrypoints=websecure"
      - "traefik.http.routers.home.tls.certresolver=letsencrypt"
      - "traefik.http.services.home.loadbalancer.server.port=8000"
      # ── ForwardAuth middleware (referenced by other services as kazusa-auth@docker) ──
      - "traefik.http.middlewares.kazusa-auth.forwardauth.address=http://kazusa-home-portal:8000/auth/verify"
      - "traefik.http.middlewares.kazusa-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Name,X-User-Role"
      - "traefik.http.middlewares.kazusa-auth.forwardauth.trustForwardHeader=true"

networks:
  traefik-net:
    external: true
    name: traefik_traefik-net
